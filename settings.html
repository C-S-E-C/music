<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Settings</title>
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <link rel="stylesheet" type="text/css" href="/css/settings.css">
    <script src="/js/api.js" defer></script>
    <script src="/js/settings.js" defer></script>
    <style id="style"></style>
</head>
<body>
    <main class="settings-page">
        <nav class="settings-nav" aria-label="Page navigation">
            <a href="home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5h-5.2a.5.5 0 0 1-.5-.5v-5.2H9.2v5.2a.5.5 0 0 1-.5.5H3.5a.5.5 0 0 1-.5-.5v-9.7z"/>
                </svg>
                <span>Home</span>
            </a>
        </nav>

        <section class="settings-header">
            <p class="eyebrow">Account</p>
            <h1>Settings</h1>
        </section>

        <div class="settings-categories" role="tablist" aria-label="Settings categories">
            <button class="settings-category active" type="button" role="tab" aria-selected="true" data-category="all">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z"/>
                </svg>
                <span>All</span>
            </button>
            <button class="settings-category" type="button" role="tab" aria-selected="false" data-category="connection">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7a8 8 0 0 1 16 0h-2a6 6 0 0 0-12 0H4zm3 4a5 5 0 0 1 10 0h-2a3 3 0 0 0-6 0H7zm4 4a1 1 0 1 1 2 0v4h-2v-4z"/>
                </svg>
                <span>Connection</span>
            </button>
            <!-- <button class="settings-category" type="button" role="tab" aria-selected="false" data-category="playback">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5.2c0-.8.8-1.3 1.5-.9l9.7 5.8c.7.4.7 1.4 0 1.8l-9.7 5.8c-.7.4-1.5-.1-1.5-.9V5.2zM4 5h2v14H4V5z"/>
                </svg>
                <span>Playback</span>
            </button> -->
            <button class="settings-category" type="button" role="tab" aria-selected="false" data-category="experience">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2.8 14.9 9h6.6l-5.2 4.1 1.9 6.5-6.2-3.7-6.2 3.7 1.9-6.5L2.5 9h6.6L12 2.8z"/>
                </svg>
                <span>Experience</span>
            </button>
        </div>

        <form id="settings-form" class="settings-form">
            <section class="settings-section" data-category="connection" aria-labelledby="connection-title">
                <div>
                    <h2 id="connection-title">Connection</h2>
                    <p>Set the backend endpoint this browser should use.</p>
                </div>
                <label class="field">
                    <span>API URL</span>
                    <input id="api-url" name="apiUrl" type="url" placeholder="https://api.example.com" autocomplete="url">
                </label>
            </section>

            <section class="settings-section" data-category="experience" aria-labelledby="experience-title">
                <div>
                    <h2 id="playback-title">Experience</h2>
                    <p>Tune buffering behavior for streaming songs.</p>
                </div>
                <label class="field">
                    <span>Preload chunks</span>
                    <input id="preload-chunks" name="preloadChunkCount" type="number" min="0" max="8" step="1">
                </label>
            </section>

            <section class="settings-section" data-category="experience" aria-labelledby="experience-title" betaNeeded>
                <div>
                    <h2 id="experience-title">Experience</h2>
                    <p>Control optional beta interface behavior.</p>
                </div>
                <label class="toggle">
                    <input id="beta-loading-page" name="betaLoadingPage" type="checkbox">
                    <span>Show beta loading animation</span>
                </label>
            </section>

            <div class="settings-actions">
                <button id="save-settings" type="submit">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 3h11.6L21 7.4V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h1zm2 2v5h8V5H7zm0 14h10v-6H7v6z"/>
                    </svg>
                    <span>Save</span>
                </button>
                <button id="reset-settings" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5a7 7 0 1 1-6.3 4H3l3.8-4L10.5 9H7.9A5 5 0 1 0 12 7V5z"/>
                    </svg>
                    <span>Reset</span>
                </button>
                <p id="settings-status" role="status" aria-live="polite"></p>
            </div>
        </form>
    </main>
</body>
</html>
