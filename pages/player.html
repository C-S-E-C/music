<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Player</title>
    <link rel="stylesheet" type="text/css" href="/css/pages/home.css">
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <script src="/js/pages/player.js" defer></script>
    <style id="style"></style>
</head>
<body>
    <main class="large-player-page">
        <nav class="top-nav" aria-label="Page navigation">
            <a href="home.html">Home</a>
        </nav>

        <section class="large-player" aria-label="Now playing">
            <button id="large-cover" class="large-cover" type="button" aria-label="Toggle play"></button>

            <div class="large-player-info">
                <p class="eyebrow">Now Playing</p>
                <h1 id="large-title">Nothing playing</h1>
                <p id="large-artist">Choose a song to start playback.</p>
            </div>

            <div class="large-progress">
                <div class="large-time">
                    <span id="large-current">00:00.0</span>
                    <span id="large-duration">00:00.0</span>
                </div>
                <div class="large-bar-layer">
                    <div id="large-bar"></div>
                </div>
            </div>

            <div class="large-controls">
                <button id="large-prev" type="button" aria-label="Previous song">
                    <svg viewBox="0 0 32 28" aria-hidden="true">
                        <path d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z"/>
                    </svg>
                </button>
                <button id="large-play" type="button" aria-label="Play or pause">
                    <svg viewBox="0 0 32 28" aria-hidden="true">
                        <path id="large-pause-icon" d="M13.293 22.772c.955 0 1.436-.481 1.436-1.436V6.677c0-.98-.481-1.427-1.436-1.427h-2.457c-.954 0-1.436.473-1.436 1.427v14.66c-.008.954.473 1.435 1.436 1.435h2.457zm7.87 0c.954 0 1.427-.481 1.427-1.436V6.677c0-.98-.473-1.427-1.428-1.427h-2.465c-.955 0-1.428.473-1.428 1.427v14.66c0 .954.473 1.435 1.428 1.435h2.465z"/>
                        <path id="large-play-icon" d="M10.345 23.287c.415 0 .763-.15 1.22-.407l12.742-7.404c.838-.481 1.178-.855 1.178-1.46 0-.599-.34-.972-1.178-1.462L11.565 5.158c-.457-.265-.805-.407-1.22-.407-.789 0-1.345.606-1.345 1.57V21.71c0 .971.556 1.577 1.345 1.577z"/>
                    </svg>
                </button>
                <button id="large-next" type="button" aria-label="Next song">
                    <svg viewBox="0 0 32 28" aria-hidden="true">
                        <path d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z"/>
                    </svg>
                </button>
            </div>
        </section>
    </main>
</body>
</html>
