<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Search</title>
    <link rel="stylesheet" type="text/css" href="/css/pages/home.css">
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <script src="/js/api.js"></script>
    <script src="/js/player.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/pages/search.js"></script>
    <style id="style"></style>
</head>
<body>
    <main class="page search-page">
        <nav class="top-nav" aria-label="Page navigation">
            <a href="home.html">Home</a>
        </nav>

        <section class="search-panel" aria-label="Search songs">
            <form class="search" method="get" action="search.html">
                <input id="search-input" type="text" name="key" placeholder="Search songs, artists, albums, etc." autocomplete="off" />
                <button id="search-btn" type="submit" aria-label="Search">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Zm5.5.2 4.2 4.2-1.4 1.4-4.2-4.2 1.4-1.4Z"/>
                    </svg>
                </button>
            </form>
        </section>

        <section class="results-head" aria-live="polite">
            <h1 id="results-title">Search</h1>
            <p id="results-count"></p>
        </section>

        <section id="results" class="results" aria-label="Search results"></section>
    </main>
</body>
</html>
