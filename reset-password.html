<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Reset Password</title>
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <link rel="stylesheet" type="text/css" href="/css/index.css">
</head>
<body>
    <div id="auth-container">
        <div class="auth-form active">
            <h1>Syntropica Music</h1>
            <h2>Reset Password</h2>
            <div id="reset-error" class="error-message"></div>
            <div id="reset-success" class="success-message"></div>

            <input type="text" id="reset-username" placeholder="Username" autocomplete="username">
            <label>OR</label>
            <input type="email" id="reset-email" placeholder="Email" autocomplete="email">
            <button id="request-reset" type="button">Request reset</button>

            <input type="text" id="reset-token" placeholder="Reset token" autocomplete="off">
            <input type="password" id="reset-new-password" placeholder="New password" autocomplete="new-password">
            <button id="set-password" type="button">Set new password</button>

            <p><a href="/index.html">Back to login</a></p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/msgapi.js"></script>
    <script src="/js/password-reset.js"></script>
</body>
</html>
