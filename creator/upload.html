<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Upload</title>
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <link rel="stylesheet" type="text/css" href="/css/upload.css">
    <script src="/js/home.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/msgapi.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/upload.js" defer></script>
    <style id="style"></style>
</head>
<body class="upload-body">
    <div id="me-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="-75 -75 1000 1000" aria-hidden="true">
            <circle cx="427.35" cy="427.35" r="414.85"/>
            <circle cx="427.35" cy="260.69" r="166.65"/>
            <path d="M721.09,710.06c-1.05,23.79-22.95,39.83-55.29,63.52-94.41,69.15-200.78,69.13-238.46,68.62-131.83-1.8-216.12-59.49-234.18-72.38-36.86-26.32-59.36-42.39-60.07-65.99-1.95-64.13,158.06-143.14,307.08-138.05,136.89,4.67,283.71,80.96,280.92,144.29Z"/>
        </svg>
        <div id="me"></div>
    </div>

    <main class="upload-page">
        <nav class="upload-nav" aria-label="Page navigation">
            <a href="/home.html">Home</a>
            <a href="/creator/index.html">Creator</a>
            <a href="/creator/history.html">History</a>
        </nav>

        <section class="upload-hero">
            <p class="upload-eyebrow">Syntropica Music</p>
            <h1>Upload a song.</h1>
            <p>Submit music for review with metadata, lyrics, and cover art.</p>
        </section>

        <form id="upload-form" class="upload-form">
            <section class="upload-section">
                <h2>Song Details</h2>
                <div class="field-grid">
                    <label>
                        <span>Title</span>
                        <input id="upload-title" name="title" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Artist</span>
                        <input id="upload-artist" name="artist" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Album</span>
                        <input id="upload-album" name="album" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Tags</span>
                        <input id="upload-tag" name="tag" type="text" autocomplete="off" placeholder="rock, indie, live">
                    </label>
                </div>
            </section>

            <section class="upload-section file-section">
                <h2>Files</h2>
                <div class="file-grid">
                    <label class="file-drop primary-file" for="audio">
                        <input id="audio" name="audio" type="file" accept="audio/*" required>
                        <strong id="audio-label">Audio file</strong>
                        <span>MP3, M4A, WAV, FLAC, or any format ffmpeg can decode.</span>
                        <span>Files over 100Mb are currently not supported</span>
                    </label>

                    <label class="file-drop" for="lyrics">
                        <input id="lyrics" name="lyrics" type="file" accept=".txt,text/plain">
                        <strong id="lyrics-label">Lyrics</strong>
                        <span>Optional plain text file.</span>
                    </label>

                    <label class="file-drop cover-drop" for="cover-file">
                        <input id="cover-file" name="cover" type="file" accept="image/jpeg,image/png,image/webp">
                        <span id="cover-preview"></span>
                        <strong id="cover-label">Cover art</strong>
                        <span>Optional square image.</span>
                    </label>
                </div>
            </section>

            <div id="upload-status" class="upload-status" role="status" aria-live="polite"></div>
            <div id="upload-progress" class="upload-progress" aria-hidden="true">
                <div class="upload-progress-track">
                    <div id="upload-progress-bar"></div>
                </div>
                <span id="upload-progress-label">0%</span>
            </div>

            <div class="upload-actions">
                <button id="upload-submit" type="submit">Upload</button>
                <button id="upload-reset" type="reset">Clear</button>
            </div>
        </form>
    </main>
    </div>
</body>
</html>
