<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Upload</title>
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <link rel="stylesheet" type="text/css" href="/css/upload.css">
    <script src="/js/home.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/player.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/upload.js" defer></script>
    <style id="style"></style>
</head>
<body class="upload-body">
    <div id="me-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="-75 -75 1000 1000" aria-hidden="true">
            <circle cx="427.35" cy="427.35" r="414.85"/>
            <circle cx="427.35" cy="260.69" r="166.65"/>
            <path d="M721.09,710.06c-1.05,23.79-22.95,39.83-55.29,63.52-94.41,69.15-200.78,69.13-238.46,68.62-131.83-1.8-216.12-59.49-234.18-72.38-36.86-26.32-59.36-42.39-60.07-65.99-1.95-64.13,158.06-143.14,307.08-138.05,136.89,4.67,283.71,80.96,280.92,144.29Z"/>
        </svg>
        <div id="me"></div>
    </div>

    <main class="upload-page">
        <nav class="upload-nav" aria-label="Page navigation">
            <a href="/home.html">Home</a>
            <a href="/creator/index.html">Creator</a>
            <a href="/creator/history.html">History</a>
        </nav>

        <section class="upload-hero">
            <p class="upload-eyebrow">Syntropica Music</p>
            <h1>Upload a song.</h1>
            <p>Submit music for review with metadata, lyrics, and cover art.</p>
        </section>

        <form id="upload-form" class="upload-form">
            <section class="upload-section">
                <h2>Song Details</h2>
                <div class="field-grid">
                    <label>
                        <span>Title</span>
                        <input id="upload-title" name="title" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Artist</span>
                        <input id="upload-artist" name="artist" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Album</span>
                        <input id="upload-album" name="album" type="text" autocomplete="off" required>
                    </label>
                    <label>
                        <span>Tags</span>
                        <input id="upload-tag" name="tag" type="text" autocomplete="off" placeholder="rock, indie, live">
                    </label>
                </div>
            </section>

            <section class="upload-section file-section">
                <h2>Files</h2>
                <div class="file-grid">
                    <label class="file-drop primary-file" for="audio">
                        <input id="audio" name="audio" type="file" accept="audio/*" required>
                        <strong id="audio-label">Audio file</strong>
                        <span>MP3, M4A, WAV, FLAC, or any format ffmpeg can decode.</span>
                        <span>Files over 100Mb are currently not supported</span>
                    </label>

                    <label class="file-drop" for="lyrics">
                        <input id="lyrics" name="lyrics" type="file" accept=".txt,text/plain">
                        <strong id="lyrics-label">Lyrics</strong>
                        <span>Optional plain text file.</span>
                    </label>

                    <label class="file-drop cover-drop" for="cover-file">
                        <input id="cover-file" name="cover" type="file" accept="image/jpeg,image/png,image/webp">
                        <span id="cover-preview"></span>
                        <strong id="cover-label">Cover art</strong>
                        <span>Optional square image.</span>
                    </label>
                </div>
            </section>

            <div id="upload-status" class="upload-status" role="status" aria-live="polite"></div>

            <div class="upload-actions">
                <button id="upload-submit" type="submit">Upload</button>
                <button id="upload-reset" type="reset">Clear</button>
            </div>
        </form>
    </main>

    <div id="player">
        <audio id="audioA" style="display: none;"></audio>
        <audio id="audioB" style="display: none;"></audio>

        <div id="progress-bar">
            <span id="time">00:00.0 / 00:00.0</span>
            <div id="bar-layer">
                <div id="bar"></div>
            </div>
        </div>

        <div id="controls">
            <button id="cover"></button>
            <div id="info">
                <span id="title">Title</span>
                <span id="artist">Artist</span>
            </div>
            <button id="prev">
                <svg viewBox="0 0 32 28" xmlns="http://www.w3.org/2000/svg" fill="currentcolor" stroke="currentcolor" style="transform: rotateZ(180deg);">
                    <path d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z" fill-rule="nonzero"></path>
                </svg>
            </button>
            <button id="play">
                <svg viewBox="0 0 32 28" xmlns="http://www.w3.org/2000/svg" fill="currentcolor" stroke="currentcolor">
                    <path id="pause-btn" style="opacity: 0;" d="M13.293 22.772c.955 0 1.436-.481 1.436-1.436V6.677c0-.98-.481-1.427-1.436-1.427h-2.457c-.954 0-1.436.473-1.436 1.427v14.66c-.008.954.473 1.435 1.436 1.435h2.457zm7.87 0c.954 0 1.427-.481 1.427-1.436V6.677c0-.98-.473-1.427-1.428-1.427h-2.465c-.955 0-1.428.473-1.428 1.427v14.66c0 .954.473 1.435 1.428 1.435h2.465z" fill-rule="nonzero"></path>
                    <path id="play-btn" d="M10.345 23.287c.415 0 .763-.15 1.22-.407l12.742-7.404c.838-.481 1.178-.855 1.178-1.46 0-.599-.34-.972-1.178-1.462L11.565 5.158c-.457-.265-.805-.407-1.22-.407-.789 0-1.345.606-1.345 1.57V21.71c0 .971.556 1.577 1.345 1.577z" fill-rule="nonzero"></path>
                </svg>
            </button>
            <button id="next">
                <svg viewBox="0 0 32 28" xmlns="http://www.w3.org/2000/svg" fill="currentcolor" stroke="currentcolor">
                    <path d="M18.14 20.68c.365 0 .672-.107 1.038-.323l8.508-4.997c.623-.365.938-.814.938-1.37 0-.564-.307-.988-.938-1.361l-8.508-4.997c-.366-.216-.68-.324-1.046-.324-.73 0-1.337.556-1.337 1.569v4.773c-.108-.399-.406-.73-.904-1.021L7.382 7.632c-.357-.216-.672-.324-1.037-.324-.73 0-1.345.556-1.345 1.569v10.235c0 1.013.614 1.569 1.345 1.569.365 0 .68-.108 1.037-.324l8.509-4.997c.49-.29.796-.631.904-1.038v4.79c0 1.013.615 1.569 1.345 1.569z" fill-rule="nonzero"></path>
                </svg>
            </button>
        </div>
    </div>
</body>
</html>
