<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropica Music - Message Center</title>
    <link rel="stylesheet" type="text/css" href="/css/base.css">
    <link rel="stylesheet" type="text/css" href="/css/message-center.css">
    <script src="/js/api.js" defer></script>
    <script src="/js/msgapi.js" defer></script>
    <script src="/js/message-center.js" defer></script>
    <style id="style"></style>
</head>
<body>
    <main class="message-page">
        <nav class="message-nav" aria-label="Page navigation">
            <a href="/home.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5h-5.2a.5.5 0 0 1-.5-.5v-5.2H9.2v5.2a.5.5 0 0 1-.5.5H3.5a.5.5 0 0 1-.5-.5v-9.7z"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="/settings.html">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1c-.8-.6-1.6-1-2.6-1.3L14 2.6h-4l-.4 2.6c-1 .3-1.8.7-2.6 1.3l-2.4-1-2 3.5 2 1.5c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2 1.5 2 3.5 2.4-1c.8.6 1.6 1 2.6 1.3l.4 2.6h4l.4-2.6c1-.3 1.8-.7 2.6-1.3l2.4 1 2-3.5-2-1.5zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z"/>
                </svg>
                <span>Settings</span>
            </a>
        </nav>

        <header class="message-header">
            <p class="eyebrow">Account</p>
            <h1>Message Center</h1>
            <p id="message-count" aria-live="polite"></p>
        </header>

        <section class="message-toolbar" aria-label="Message filters">
            <button class="message-filter active" type="button" data-filter="all">All</button>
            <button class="message-filter" type="button" data-filter="song_approval">Songs</button>
            <button class="message-filter" type="button" data-filter="transfer_timeleft">Received</button>
            <button class="message-filter" type="button" data-filter="transfered_timeleft">Sent</button>
            <button class="message-filter" type="button" data-filter="auditor_granted">Auditor</button>
        </section>

        <section id="message-list" class="message-list" aria-live="polite"></section>
        <section id="message-empty" class="message-empty" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 5.5A2.5 2.5 0 0 1 5.5 3h13A2.5 2.5 0 0 1 21 5.5v9A2.5 2.5 0 0 1 18.5 17H8l-5 4V5.5zm2.5-.5a.5.5 0 0 0-.5.5v11.3L7.3 15h11.2a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-13z"/>
            </svg>
            <h2>No messages</h2>
            <p>Messages will appear here after msgAPI receives them.</p>
        </section>
    </main>
</body>
</html>
